<h2>Create Order</h2>

<form method="POST">
	{% csrf_token %}

	<label for="book">Book</label>
	<select id="book" name="book" required>
		<option value="">Select book</option>
		{% for book in books %}
		<option value="{{ book.id }}">{{ book.name }} (id: {{ book.id }})</option>
		{% endfor %}
	</select>

	<br />
	<br />

	<label for="plated_end_at">Planned return date</label>
	<input id="plated_end_at" type="datetime-local" name="plated_end_at" required />

	<br />
	<br />

	<button type="submit">Create</button>
</form>

{% if messages %}
	{% for message in messages %}
	<p>{{ message }}</p>
	{% endfor %}
{% endif %}

<a href="{% url 'order:user-orders' %}">My Orders</a>
<a href="{% url 'auth:dashboard' %}">Dashboard</a>
<a href="{% url 'auth:logout' %}">Log out</a>
