<ul>
  {% for author in authors %}
  <li>
    {{ author.name }} {{author.surname}} {{author.patronymic}}

    <form action="{% url 'author:delete-author' author.id %}" method="POST">
      {% csrf_token %}
      <button
        type="submit"
        onclick="return confirm('Are you sure you want to delete this?');"
      >
        Delete
      </button>
    </form>
  </li>
  {% endfor %}
</ul>

<a href="{% url 'author:add-author' %}">Add more authors</a>
<a href="{% url 'auth:dashboard' %}">Dashboard</a>
<a href="{% url 'auth:logout' %}">Log out</a>

{% if messages %} {% for message in messages %}
<p>{{message}}</p>
{% endfor %} {% endif %}
